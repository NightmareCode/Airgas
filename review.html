<!DOCTYPE html>
<html>
<head>
    <title>Visual Audit</title>
    <style>
        body { font-family: sans-serif; background: #fff; }
        .grid { display: flex; flex-wrap: wrap; gap: 20px; }
        .card { width: 150px; border: 1px solid #ccc; padding: 10px; text-align: center; }
        img { max-width: 100%; max-height: 100px; object-fit: contain; }
        p { font-size: 11px; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>Product Visual Audit</h1>
    <div class="grid" id="audit-grid"></div>
    <script>
        fetch('assets/products.json').then(res => res.json()).then(data => {
            const grid = document.getElementById('audit-grid');
            const categoryFolders = {
                'PPE for ERT': 'PPEForERT',
                'PPE at Works': 'PPEAtWorks',
                'Gases': 'Gases',
                'Gas Equipment': 'GasEquipment',
                'Personal Care': 'PersonalCare',
                'Service & Maintenance': 'ServiceAndMaintenance',
                'Welding Products': 'WeldingProducts'
            };
            
            data.products.forEach(p => {
                const f = categoryFolders[p.category];
                if(f) {
                    const c = document.createElement('div');
                    c.className = 'card';
                    const sName = p.name.replace(/[^a-zA-Z0-9\s]/g, '').trim() + '.png';
                    c.innerHTML = `
                        <img src="assets/${f}/${sName}">
                        <p>${p.name}<br>(${p.category})</p>
                    `;
                    grid.appendChild(c);
                }
            });
        });
    </script>
</body>
</html>
